name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-features --exclude gpui -- -D warnings

      - name: Check (default features)
        run: cargo check --workspace

      - name: Check (capture feature)
        run: cargo check -p gpui-preview --features capture

      - name: Test
        run: cargo test -p gpui-preview
